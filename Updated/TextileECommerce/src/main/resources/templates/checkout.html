<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <header class="bg-dark text-white py-3">
        <div class="container text-center">
            <h1>Checkout</h1>
        </div>
    </header>

    <div class="container my-5">
        <div class="row">
            <!-- Display the product details -->
            <div class="col-md-6 offset-md-3 mb-4">
                <div class="card h-100 shadow">
                    <img th:src="@{${product.image}}" alt="Product Image" class="card-img-top" style="height: 300px; object-fit: cover;">
                    <div class="card-body text-center">
                        <h4 class="card-title" th:text="${product.title}"></h4>
                        <h5 class="text-danger" th:text="'₹' + ${product.discountPrice} + ' per meter'"></h5>
                        <p class="card-text" th:text="${product.description}"></p>
                        
                        <!-- Meters Input -->
                        <div class="form-group">
                            <label for="meters">Enter the number of meters:</label>
                            <input type="number" class="form-control" id="meters" name="meters" form="checkoutForm" min="1" required>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Saved Addresses Section -->
        <div class="container mt-5">
            <h2 class="text-center mb-4">Your Saved Addresses</h2>
            <form th:action="@{/payment/razorpay}" method="post" id="checkoutForm">
                <input type="hidden" name="productId" th:value="${product.id}" />
                <input type="hidden" name="productName" th:value="${product.title}" />
                <input type="hidden" name="image" th:value="${product.image}" />
                <input type="hidden" name="totalPrice" th:value="${product.discountPrice}" />
                <input type="hidden" name="name" th:value="${user.fullName}" />
                <input type="hidden" name="userId" th:value="${user.id}" />
                <input type="hidden" name="email" th:value="${user.email}" />
                <input type="hidden" name="paymentType" value="COD" /> <!-- Assuming Cash on Delivery for now -->
                <div class="form-group row">
                    <label for="mobile" class="col-sm-3 col-form-label">Mobile Number</label>
                    <div class="col-sm-9">
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text"><i class="fas fa-phone-alt"></i></span>
                            </div>
                            <input type="tel" class="form-control" id="mobile" name="mobile" placeholder="Enter your mobile number" required pattern="[0-9]{10}" title="Enter a valid 10-digit mobile number">
                        </div>
                        <small class="form-text text-muted">We’ll use this number to contact you regarding your order.</small>
                    </div>
                </div>
                <!-- Addresses -->
                <div class="row" th:each="address, iterStat : ${userAddresses}">
                    <div class="card shadow mb-4 col-md-6 offset-md-3">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${address.label}">Home</h5>
                            <p class="card-text">
                                <input type="hidden" name="address.street" th:value="${address.street}" />
                                <input type="hidden" name="address.city" th:value="${address.city}" />
                                <input type="hidden" name="address.state" th:value="${address.state}" />
                                <input type="hidden" name="address.zipCode" th:value="${address.zipCode}" />
                                <input type="hidden" name="address.country" th:value="${address.country}" />
                                <span th:text="${address.street}">1234 Street</span>,<br>
                                <span th:text="${address.city}">City</span>,<br>
                                <span th:text="${address.state}">State</span>,<br>
                                <span th:text="${address.zipCode}">ZipCode</span>,<br>
                                <span th:text="${address.country}">Country</span>
                            </p>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="selectedAddress" th:value="${iterStat.index}" th:checked="${iterStat.index == 0}">
                                <label class="form-check-label">Use this Address</label>
                            </div>
                            <a th:if="${user.addresses.size() > 1}" 
                                th:href="@{/user/delete-address/{idx}(idx=${iterStat.index}, productId=${productId})}"  class="btn btn-danger btn-sm mt-2"
                                onclick="return confirm('Are you sure you want to delete this address?');">
                                Delete
                             </a>
                     
                        </div>
                    </div>
                </div>

                <!-- Proceed to Payment Button -->
                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-success btn-lg">Confirm Purchase</button>
                </div>
            </form>

            <!-- Add New Address Button -->
            <div class="text-center mt-4">
                <button class="btn btn-primary" data-toggle="modal" data-target="#addAddressModal">
                    Add New Address
                </button>
            </div>

            <div class="text-center mt-4">
                <a href="/home" class="btn btn-secondary btn-lg">Back to Home</a>
            </div>
        </div>

        <!-- Modal for Adding a New Address -->
        <div class="modal fade" id="addAddressModal" tabindex="-1" aria-labelledby="addAddressModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="addAddressModalLabel">Add New Address</h5>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <div class="modal-body">
                        <!-- Address Form -->
                        <form th:action="@{/user/add-address}" method="post" id="newAddressForm">
                            <input type="hidden" name="productId" th:value="${product.id}" />
                            <div class="mb-3">
                                <label for="street" class="form-label">Street</label>
                                <input type="text" class="form-control" name="street" required>
                            </div>
                            <div class="mb-3">
                                <label for="city" class="form-label">City</label>
                                <input type="text" class="form-control" name="city" required>
                            </div>
                            <div class="mb-3">
                                <label for="state" class="form-label">State</label>
                                <input type="text" class="form-control" name="state" required>
                            </div>
                            <div class="mb-3">
                                <label for="zipCode" class="form-label">Zip Code</label>
                                <input type="text" class="form-control" name="zipCode" required>
                            </div>
                            <div class="mb-3">
                                <label for="country" class="form-label">Country</label>
                                <input type="text" class="form-control" name="country" required>
                            </div>
                            <div class="mb-3">
                                <label for="label" class="form-label">Label (e.g., Home, Work)</label>
                                <input type="text" class="form-control" name="label" required>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                                <button type="submit" class="btn btn-primary">Save Address</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>

   

    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>

</html>
