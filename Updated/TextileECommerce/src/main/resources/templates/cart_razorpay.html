<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .custom-container {
            margin: 50px auto;
            padding: 30px;
            background-color: #f8f9fa;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            text-align: center;
        }
        .custom-heading {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .custom-button {
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>

</head>
<body>
    <h1>Complete Your Payment</h1>
    <div class="container custom-container" style="text-align: center;">
        <h1 class="custom-heading">Welcome to the Page!</h1>
    
    <button id="rzp-button1" class="btn btn-primary custom-button">Pay ₹ <span th:text="${totalOrderPrice}"></span></button>
</div>

    <form th:action="@{/payment/cart/success}" method="post">
        <input type="hidden" name="razorpayPaymentId" id="razorpayPaymentId">
        <input type="hidden" name="razorpayOrderId" th:value="${razorpayOrderId}">
        <input type="hidden" name="razorpaySignature" id="razorpaySignature">
        <input type="hidden" name="addressIndex" th:value="${addidx}">
        <input type="hidden" id="fullname" th:value="${user.fullName}">
        <input type="hidden" id="email" th:value="${user.email}">
        
        <input type="hidden" id="totalOrderPrice" th:value="${totalOrderPrice}" name="totalOrderPrice">
    </form>

    <script>
        var options = {
            "key": "rzp_test_JfT5Na6ZsaWOpl", // Enter the Key ID generated from Razorpay Dashboard
            "amount": document.getElementById('totalOrderPrice').value * 100, // Amount is in paise
            "currency": "INR",
            "name": document.getElementById('fullname').value, 
             "image": "/images/logo.jpg",
            "description": "Transaction",
            "order_id":document.getElementById('razorpayPaymentId').value, // Generated by Razorpay server
            "handler": function (response){
                document.getElementById('razorpayPaymentId').value = response.razorpay_payment_id;
                document.getElementById('razorpaySignature').value = response.razorpay_signature;
                document.forms[0].submit();
            },
            "prefill": {
                "name": document.getElementById('fullname').value,
                "email": document.getElementById('email').value,
            },
            "theme": {
                "color": "#3399cc"
            }
        };
        var rzp1 = new Razorpay(options);
        document.getElementById('rzp-button1').onclick = function(e){
            rzp1.open();
            e.preventDefault();
        }
    </script>
</body>
</html>
