<!-- my-orders.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .order-card {
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            transition: transform 0.2s ease-in-out;
        }

        .order-card:hover {
            transform: translateY(-5px);
        }

        .status-badge {
            font-size: 0.9em;
            padding: 0.5em 0.75em;
        }

        .btn-custom {
            background-color: #6f42c1;
            color: #fff;
        }

        .btn-custom:hover {
            background-color: #563d7c;
        }
    </style>
</head>
<body>
    <div class="container my-5">
        <h2 class="text-center mb-5">My Orders</h2>
        <div class="row gy-4">
            <!-- Dynamically populate the orders using Thymeleaf -->
            <div class="col-md-6 col-lg-4" th:each="order : ${orders}">
                <div class="card order-card p-3">
                    <div class="card-body">
                        <h5 class="card-title">Order ID: <span th:text="${order.id}">12345</span></h5>
                        <img th:src="${order.image}" alt="Product Image" class="img-fluid img-thumbnail mt-3" style="width: 100px; height: 100px;">
                        <p class="card-text"><strong>Date:</strong> <span th:text="${order.orderDate}">25-09-2023</span></p>
                        <p class="card-text"><strong>Product:</strong> <span th:text="${order.productName}">Product Name</span></p>
                        <p class="card-text"><strong>Quantity:</strong> ₹<span th:text="${order.quantity}">99.99</span></p>
                        <p class="card-text"><strong>Total Price:</strong> ₹<span th:text="${order.totalPrice}">99.99</span></p>
                        <p class="card-text"><strong>Address:</strong> <span th:text="${order.address}">Address</span></p>
                        <p class="card-text"><strong>Status:</strong> <span th:text="${order.status}">Status</span></p>
                       
                    </div>
                </div>
            </div>
        </div>
        <div class="text-center mt-5">
            <a href="/user/profile" class="btn btn-custom">Back to Dashboard</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
