<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #343a40;
            color: #fff;
            padding: 15px 0;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2.5em;
        }

        nav {
            text-align: center;
            background-color: #444;
            padding: 10px 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.2em;
        }

        nav a:hover {
            color: #f0a500;
        }

        .profile-container {
            margin: 20px auto;
            padding: 30px;
            max-width: 800px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .profile-header img {
            border-radius: 50%;
            width: 150px;
            height: 150px;
            object-fit: cover;
            margin-right: 30px;
        }

        .profile-details {
            text-align: left;
        }

        .profile-details h2 {
            margin: 0;
            font-size: 2em;
            color: #333;
        }

        .profile-details p {
            color: #555;
            font-size: 1.2em;
            margin-bottom: 5px;
        }

        .profile-actions {
            text-align: center;
            margin-top: 30px;
        }

        .profile-actions a {
            text-decoration: none;
            background-color: #007bff;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            margin-right: 10px;
            font-size: 1.1em;
            transition: background-color 0.3s ease;
        }

        .profile-actions a:hover {
            background-color: #0056b3;
        }

        .btn-orders {
            background-color: #28a745;
            margin-left: 10px;
        }

        .btn-orders:hover {
            background-color: #218838;
        }

        /* Address formatting */
        .profile-details ul {
            list-style-type: none;
            padding-left: 0;
        }

        .profile-details li {
            padding: 5px 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>User Profile</h1>
    </header>

    <nav>
        <a href="/home">Home</a>
        <a href="#">Shop</a>
        <a href="/portfolio">About Us</a>
        <a href="#">Contact</a>
        <a href="/user/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>

    <div class="profile-container">
        <div class="profile-header">
            <!-- Placeholder for user profile picture -->
            <img th:src="@{${user.profilePictureUrl}}" alt="Profile Picture">
            <div class="profile-details">
                <!-- User details -->
                <h2 th:text="${user.fullName}">John Doe</h2>
                <p>Email: <span th:text="${user.email}">johndoe@example.com</span></p>

                <!-- Properly formatted address -->
                <p>Address:</p>
                <ul>
                    <li th:each="address : ${user.addresses}">
                        <strong>Street:</strong> <span th:text="${address.street}">Street</span>, 
                        <strong>City:</strong> <span th:text="${address.city}">City</span>, 
                        <strong>State:</strong> <span th:text="${address.state}">State</span>, 
                        <strong>ZipCode:</strong> <span th:text="${address.zipCode}">ZipCode</span>, 
                        <strong>Country:</strong> <span th:text="${address.country}">Country</span>
                    </li>
                </ul>
            </div>
        </div>

        <div class="profile-actions">
            <!-- "My Orders" button -->
            <a href="/user/myorders" class="btn btn-orders">My Orders</a>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
