<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f5f5f5;
        }

        .back-home-btn {
            display: flex;
            align-items: center;
            background-color: #ff6b6b;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease-in-out;
            margin-bottom: 20px;
            text-decoration: none;
            width: fit-content;
        }

        .back-home-btn:hover {
            background-color: #e55039;
            transform: translateY(-3px);
        }

        .back-home-btn i {
            margin-right: 10px;
            font-size: 1.2rem;
        }

        .product-card {
            margin: 30px auto;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
            background-color: #fff;
        }

        @media (min-width: 768px) {
            .product-card {
                flex-direction: row;
            }
        }

        .product-image-container {
            flex: 1;
            max-height: 500px;
            overflow: hidden;
            position: relative;
            cursor: zoom-in;
        }

        .product-image {
            object-fit: cover;
            height: 100%;
            width: 100%;
            transition: transform 0.4s ease-in-out;
        }

        .product-image-container:hover .product-image {
            transform: scale(1.2); /* Zoom effect */
        }

        @media (max-width: 767px) {
            .product-image {
                height: auto;
                width: 100%;
            }
        }

        .product-info {
            flex: 1;
            padding: 40px;
            position: relative;
        }

        .product-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .product-category {
            color: #6c757d;
            font-size: 1rem;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .product-description {
            color: #4a4a4a;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .price {
            font-size: 2rem;
            font-weight: bold;
            color: #2c3e50;
        }

        .old-price {
            font-size: 1.4rem;
            color: #888;
            text-decoration: line-through;
            margin-left: 10px;
        }

        .discount {
            font-size: 1.1rem;
            color: #e74c3c;
            background-color: #fde2e2;
            padding: 5px 12px;
            border-radius: 5px;
            margin-left: 15px;
        }

        .button-container {
            display: flex;
            flex-direction: column; /* Stack buttons vertically on small screens */
            gap: 10px; /* Add space between buttons */
            margin-top: 20px; /* Add margin for separation */
        }

        .btn-buy-now, .btn-add-cart {
            flex: 1; /* Allow buttons to grow */
        }

        .btn-buy-now {
            background-color: #3498db;
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease-in-out;
        }

        .btn-buy-now:hover {
            background-color: #2980b9;
            transform: translateY(-5px);
        }

        .btn-add-cart {
            background-color: #2ecc71;
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease-in-out;
        }

        .btn-add-cart:hover {
            background-color: #27ae60;
            transform: translateY(-5px);
        }

        .product-info::before {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            width: 40%;
            height: 100%;
            background-color: rgba(52, 152, 219, 0.1);
            z-index: -1;
        }

        /* Full-screen overlay for image */
        #imageModal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
        }

        #imageModal img {
            display: block;
            max-width: 80%;
            max-height: 80%;
            margin: 50px auto;
        }

        #imageModal:target {
            display: block;
        }
    </style>
</head>
<body>

<div class="container my-5">
    <!-- Back to Home Button -->
    <a href="/home" class="back-home-btn">
        <i class="bi bi-arrow-left-circle"></i> Back to Home
    </a>

    <div class="product-card">
        <!-- Product Image -->
        <div class="product-image-container">
            <img id="productImage" th:src="${product.image}" class="product-image" alt="Product Image">
        </div>

        <!-- Product Info -->
        <div class="product-info">
            <h1 class="product-title" th:text="${product.title}">Product Title</h1>
            <p class="product-category" th:text="${product.category}">Product Category</p>
            <p class="product-description" th:text="${product.description}">Product Description</p>
            <div class="d-flex align-items-center mb-3">
                <span class="price" th:text="'₹' + ${product.discountPrice}">₹999</span>
                <span class="old-price" th:if="${product.discount > 0}" th:text="'₹' + ${product.price}">₹1299</span>
                <span class="discount ms-3" th:if="${product.discount > 0}" th:text="'-' + ${product.discount} + '%'">-20%</span>
            </div>
            <div class="button-container">
                <button class="btn btn-buy-now"
                        th:attr="data-checkout-url=${loggedInUser != null ? '/checkout/' + product.id : ''}, 
                                 data-login-url=${loggedInUser == null ? '/login' : ''}"
                        onclick="handleButtonClickBuy(this)">Buy Now</button>

                <button class="btn btn-add-cart"
                        th:attr="data-add-url=${loggedInUser != null ? '/cart/add/' + product.id + '?quantity=1' : ''}, 
                                 data-login-url=${loggedInUser == null ? '/login' : ''}"
                        onclick="handleButtonClick(this)">
                    Add to Cart
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal for full-screen image -->
<div id="imageModal">
    <img src="" alt="Full-screen image" id="fullImage">
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.js"></script>

<script>
    // Image Zoom Functionality
    document.getElementById('productImage').addEventListener('click', function () {
        var fullImage = document.getElementById('fullImage');
        fullImage.src = this.src;
        document.getElementById('imageModal').style.display = 'block';
    });

    // Hide full-screen modal when clicked
    document.getElementById('imageModal').addEventListener('click', function () {
        this.style.display = 'none';
    });

    function handleButtonClick(button) {
        var addUrl = button.getAttribute('data-add-url');
        var loginUrl = button.getAttribute('data-login-url');

        if (addUrl) {
            location.href = addUrl;
        } else if (loginUrl) {
            location.href = loginUrl;
        }
    }

    function handleButtonClickBuy(button) {
        var checkoutUrl = button.getAttribute('data-checkout-url');
        var loginUrl = button.getAttribute('data-login-url');

        if (checkoutUrl) {
            location.href = checkoutUrl;
        } else if (loginUrl) {
            location.href = loginUrl;
        }
    }
</script>
</body>
</html>
