<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <style>
        @import url('https://fonts.googleapis.com/css?family=Open+Sans:100,300,400,700');
        @import url('//netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css');

        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        input:focus::placeholder {
            color: rgba(0,0,0,0.7);
        }

        .registration-form {
            background: #222;
            box-shadow: 0 0 1rem rgba(0,0,0,0.3);
            max-width: 700px;
            padding: 1rem;
            border-radius: 4px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .form-grid {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 1rem;
        }

        .form-column {
            width: 48%;
        }

        .registration-text {
            color: white;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 1rem;
        }

        .registration-input {
            background: transparent;
            border: 0;
            border-bottom: 1px solid rgba(255,255,255,0.5);
            color: white;
            margin: 0.5rem 0;
            padding: 0.5rem;
            width: 100%;
        }

        .registration-button {
            background: #ff5722;
            border: none;
            color: white;
            padding: 0.75rem;
            width: 100%;
            text-transform: uppercase;
            cursor: pointer;
            margin: 1rem 0;
        }

        .underlay-photo, .underlay-black {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
        }

        .underlay-photo {
            background: url('/images/backgroumd.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .underlay-black {
            background: rgba(0,0,0,0.5);
        }

        @media (max-width: 768px) {
            .form-grid {
                flex-direction: column;
            }

            .form-column {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="underlay-photo"></div>
    <div class="underlay-black"></div>
    <div class="registration-form">
        <div class="registration-text">Register</div>
        <!-- Update the form to handle multipart data -->
        <form id="registration-form" method="post" action="user/reguser" enctype="multipart/form-data">

            <div class="form-grid">
                <!-- First Column: Personal Details -->
                <div class="form-column">
                    <input type="text" id="fullname" name="fullName" class="registration-input" placeholder="Full Name" required>
                    <input type="email" id="email" name="email" class="registration-input" placeholder="Email" required>
                    <input type="password" id="password" name="password" class="registration-input" placeholder="Password" required>
                    <input type="tel" id="mobile" name="mobile" class="registration-input" placeholder="Mobile Number" required>

                    <label style="color:wheat;">Profile Pic</label>
                    <input type="file" id="profilePicture" name="profilePicture" class="registration-input" accept="image/*" required>
                </div>

                <!-- Second Column: Address Details -->
                <div class="form-column">
                    <input type="text" id="street" name="addresses[0].street" class="registration-input" placeholder="Street" required>
                    <input type="text" id="city" name="addresses[0].city" class="registration-input" placeholder="City" required>
                    <input type="text" id="state" name="addresses[0].state" class="registration-input" placeholder="State" required>
                    <input type="text" id="zipCode" name="addresses[0].zipCode" class="registration-input" placeholder="Zip Code" required>
                    <input type="text" id="country" name="addresses[0].country" class="registration-input" placeholder="Country" required>
                    <input type="text" id="label" name="addresses[0].label" class="registration-input" placeholder="Label (e.g., Home, Office)" required>
                </div>
            </div>

            <button type="submit" class="registration-button">Sign Up</button><br>
            <a href="/home" class="registration-button">Back</a>

        </form>
    </div>
</body>

</html>
