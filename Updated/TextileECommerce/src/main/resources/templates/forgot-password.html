<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7 col-sm-9 mt-5">
                <div class="card shadow-sm">
                    <div class="card-header text-center bg-primary text-white">
                        <h2>Forgot Password</h2>
                    </div>
                    <div class="card-body">
                        <form action="post" th:action="@{/user/forgot-password}" method="post">
                            <div class="mb-3">
                                <label for="email" class="form-label">Enter your email address</label>
                                <input type="email" id="email" name="email" class="form-control" placeholder="example@example.com" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Reset Password</button>
                        </form>
                        <div class="mt-3">
                            <p class="text-danger" th:if="${errorMessage}" th:text="${errorMessage}"></p>
                            <p class="text-success" th:if="${successMessage}" th:text="${successMessage}"></p>
                        </div>
                    </div>
                    <div class="card-footer text-center">
                        <a href="/login" class="text-decoration-none">Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
