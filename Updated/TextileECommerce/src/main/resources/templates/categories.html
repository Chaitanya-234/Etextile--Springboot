<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products in Category</title>
    
    <!-- Bootstrap CSS CDN -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    
    <!-- Custom CSS -->
    <style>
        body {
            background-color: #f8f9fa; /* Light grey background */
            font-family: 'Arial', sans-serif;
        }
        header {
            text-align: center;
            padding: 20px;
            background-color: #007bff; /* Bootstrap primary blue */
            color: white;
            margin-bottom: 30px;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 0 20px;
        }
        .product {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .product:hover {
            transform: translateY(-10px); /* Hover effect */
        }
        .product img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .product h4 {
            padding: 15px 10px;
            font-size: 1.25rem;
            text-align: center;
            color: #333;
        }
        .product p {
            font-size: 1rem;
            text-align: center;
            color: #007bff;
        }
        .buy-button {
            display: block;
            background-color: #007bff;
            color: white;
            text-align: center;
            padding: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s ease;
            border-radius: 0 0 10px 10px;
        }
        .buy-button:hover {
            background-color: #0056b3; /* Darker blue on hover */
        }
        .old-price {
            font-size: 1.4rem;
            color: #888;
            text-decoration: line-through;
            margin-left: 10px;
        }
        footer {
            text-align: center;
            padding: 20px;
        }
        footer a {
            color: #007bff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>Products in <span th:text="${categoryName}">Category Name</span></h1>
    </header>

    <div class="container">
        <div class="products">
            <th:block th:each="product : ${products}">
                <div class="product">
                    <img th:src="@{${product.image}}" alt="Product Image">
                    <h4 th:text="${product.title}"></h4>
                    <p  class="old-price" th:if="${product.discount > 0}" th:text="'₹' + ${product.price}">old price</p>
                    <p th:text="'Only ₹' + ${product.discountPrice}">Price</p>
                    <a th:href="@{'/productsview/' + ${product.id}}" class="buy-button">Buy</a>
                </div>
            </th:block>
        </div>
    </div>

    <footer>
        <a href="/home">Back to Home</a>
    </footer>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
