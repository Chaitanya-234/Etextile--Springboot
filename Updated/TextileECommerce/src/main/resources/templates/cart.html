<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f9f9f9;
        }
        .cart-container {
            margin-top: 30px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background-color: #fff;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .cart-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
        }
        .cart-item-info {
            flex: 2;
            padding-left: 20px;
        }
        .cart-item-info h5 {
            margin-bottom: 5px;
        }
        .cart-item-price {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .cart-total {
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .cart-total h4 {
            font-weight: bold;
        }
        .btn-remove {
            background-color: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
        }
        .btn-remove:hover {
            background-color: #e55039;
        }
        .btn-quantity {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            margin: 0 5px;
        }
        .btn-quantity:hover {
            background-color: #0056b3;
        }
        .quantity-control {
            display: flex;
            align-items: center;
        }
        .quantity-control input {
            width: 60px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin: 0 5px;
        }
    </style>
</head>
<body>

<div class="container cart-container">
    <a href="/home" class="btn btn-secondary mb-3">Back to Home</a>
    <h1 class="text-center">Shopping Cart</h1>
    <div th:if="${#lists.isEmpty(cartItems)}" class="text-center">
        <p>Your cart is empty. <a href="/products">Start shopping</a>!</p>
    </div>
    <div th:if="${not #lists.isEmpty(cartItems)}">
    <div class="row">
        <div class="col-md-8">
            <div th:each="cartItem : ${cartItems}" class="cart-item">
                <!-- Product Image -->
                <img th:src="@{${cartItem.product.image}}" alt="Product Image">
                
                <!-- Product Info -->
                <div class="cart-item-info">
                    <h5 th:text="${cartItem.product.title}">Product Title</h5>
                    <p th:text="'Category: ' + ${cartItem.product.category}">Product Category</p>
                    
                    <!-- Quantity Control -->
                    <form th:action="@{'/cart/updateQuantity/' + ${cartItem.product.id}}" method="post" class="quantity-control">
                      
                        <button type="submit" name="action" value="decrease" class="btn-quantity">-</button>
                    
                      
                        <input type="text" name="quantity" th:value="${cartItem.quantity}" readonly>
                    
                       
                        <button type="submit" name="action" value="increase" class="btn-quantity">+</button>
                    </form>
                    
                    
                    <p>Price: ₹<span th:text="${cartItem.product.discountPrice}">999</span></p>
                </div>

                <!-- Remove Button -->
                <form th:action="@{'/cart/remove/' + ${cartItem.id}}" method="post">
                    <button type="submit" class="btn-remove">Remove</button>
                </form>

                <!-- Total Price -->
                <div class="cart-item-price">
                    ₹<span th:text="${cartItem.totalPrice}">999</span>
                </div>
            </div>
        </div>

        <!-- Total Order Price -->
        <div class="col-md-4">
            <div class="cart-total">
                <h4>Total: ₹<span th:text="${totalOrderPrice}">0</span></h4>
                

                <a th:href="@{'/checkout/cart/'+${cartItems[0].user.id}}" class="btn btn-primary btn-block">Checkout</a>
            </div>
        </div>
    </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
