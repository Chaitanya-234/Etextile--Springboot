<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eTextile - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 15px 0;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2.5em;
        }

        nav {
            background-color: #444;
            padding: 10px;
        }

        .nav-link {
            color: #fff !important;
        }

        .nav-link:hover {
            color: #f0a500 !important;
        }

        .hero {
            position: relative;
            height: 60vh;
            overflow: hidden;
        }

        .slides {
            display: flex;
            width: 400%;
            height: 100%;
            animation: slide 20s infinite;
        }

        .slide {
            width: 25%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .slide-content {
            z-index: 1;
        }

        @keyframes slide {
            0%, 20% { transform: translateX(0); }
            25%, 45% { transform: translateX(-25%); }
            50%, 70% { transform: translateX(-50%); }
            75%, 100% { transform: translateX(-75%); }
        }

        .categories-container {
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        /* Style for larger screens */
        @media (min-width: 768px) {
            .categories-container {
                display: flex;
                justify-content: center; /* Center categories on larger screens */
            }
        }

        /* Style for smaller screens */
        @media (max-width: 767px) {
            .categories-container {
                overflow-x: auto; /* Enable horizontal scroll */
                white-space: nowrap; /* Keep items in a single line */
                display: block; /* Block for mobile */
            }

            .categories {
                display: inline-block; /* Keep categories inline */
            }
        }

        .category {
            display: inline-block; /* Categories are in a row */
            text-align: center;
            margin-right: 15px; /* Add space between categories */
            vertical-align: top;
        }

        .category-img {
            border-radius: 50%;
            width: 100px;
            height: 100px;
            object-fit: cover; /* Keep images properly scaled */
        }

        .category-section h3 {
            text-align: center;
            margin-bottom: 20px;
        }


        .content {
            padding: 20px;
            text-align: center;
        }

        .content h3 {
            font-size: 2em;
            margin-bottom: 20px;
        }

        .products {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
        }

        .product {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            width: 300px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .product img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .product h4 {
            margin: 15px 0;
            font-size: 1.5em;
        }

        .product p {
            color: #777;
            margin-bottom: 15px;
        }

        .product a {
            text-decoration: none;
            background-color: #f0a500;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 1em;
        }

        .old-price {
            font-size: 1.4rem;
            color: #888;
            text-decoration: line-through;
            margin-left: 10px;
        }

        .product a:hover {
            background-color: #d18f00;
        }

        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 10px 0;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <header>
        <h1>eTextile</h1>
    </header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">eTextile</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/home">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#products-section">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="/portfolio">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="/contact">Contact</a></li>
                    <li class="nav-item" style="display: flex; align-items: center;">
                        <form action="/search" method="get" class="d-flex">
                            <input type="text" name="query" placeholder="Search Products..." required class="form-control me-2">
                            <button type="submit" class="btn btn-outline-light"><i class="fas fa-search"></i></button>
                        </form>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/cart"><i class="fas fa-shopping-cart"></i> Cart</a>
                    </li>
                </ul>
                <!-- Login and Profile section -->
                <ul class="navbar-nav ms-auto">
                    <!-- Check if user is logged in -->
                    <li class="nav-item" th:if="${user != null}">
                        <a class="nav-link" href="/user/profile">
                            <i class="fas fa-user"></i> <span th:text="'Hello, ' + ${user.fullName}"></span>
                        </a>
                    </li>
                    <li class="nav-item" th:if="${user != null}">
                        <a class="nav-link" href="user/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </li>
                    <!-- If user is not logged in -->
                    <li class="nav-item" th:if="${user == null}">
                        <a class="nav-link" href="/login"><i class="fas fa-sign-in-alt"></i> Sign In</a>
                    </li>
                    <li class="nav-item" th:if="${user == null}">
                        <a class="nav-link" href="/register"><i class="fas fa-user-plus"></i> Sign Up</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="hero">
        <div class="slides">
            <!-- Loop through only 4 products for the hero slides -->
            <th:block th:each="product : ${limitedProducts}">
                <div class="slide">
                    <img th:src="@{${product.image}}" alt="Product Image">
                    <div class="slide-content">
                        <h2 th:text="${product.title}">Product Title</h2>
                        <p th:text="'Price: ₹' + ${product.discountPrice}">Product Price</p>
                        <p th:if="${product.discount != null}" th:text="'Discount: ' + ${product.discount} + '%'">Discount</p>
                    </div>
                </div>
            </th:block>
        </div>
    </div>

    <div class="container">
        <div class="category-section">
            <h3>Explore Our Categories</h3>
            <div class="categories-container">
                <div class="categories">
                    <!-- Loop through the unique categories -->
                    <th:block th:each="entry : ${uniqueCategories}">
                        <div class="category">
                            <!-- Make the category image clickable and link to products by category -->
                            <a th:href="@{/category/{categoryName}(categoryName=${entry.key})}">
                                <img th:src="@{${entry.value}}" alt="Category Image" class="category-img">
                            </a>
                            <!-- Make the category name clickable too -->
                            <h4>
                                <a th:href="@{/category/{categoryName}(categoryName=${entry.key})}" th:text="${entry.key}"></a>
                            </h4>
                        </div>
                    </th:block>
                </div>
            </div>
        </div>
    </div>

    <!-- Products Section -->
    <div class="content" id="products-section">
        <h3>Featured Products</h3>
        <div class="products">
            <th:block th:each="product : ${products}">
                <div class="product">
                    <img th:src="@{${product.image}}" alt="Product Image">
                    <h4 th:text="${product.title}">Product Title</h4>
                    <p th:text="'₹' + ${product.discountPrice}">Product Price</p>
                    <p class="old-price" th:if="${product.discountPrice lt product.price}" th:text="'₹' + ${product.price}">Old Price</p>
                    <a th:href="@{/productsview/{id}(id=${product.id})}">Buy Now</a>
                </div>
            </th:block>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 eTextile. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
