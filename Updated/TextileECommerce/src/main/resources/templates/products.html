<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f6f9;
        }
        .container {
            padding-top: 50px;
        }
        .table th, .table td {
            vertical-align: middle;
        }
        .modal-header {
            background-color: #007bff;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="text-start mb-4">
            <a href="/admin/dashboard" class="btn btn-back">
                <i class="fas fa-arrow-left"></i> Back to Admin Dashboard
            </a>
        </div>
        <h1 class="text-center mb-4">Product Management</h1>
        
        <!-- Add Product Button -->
        <div class="text-end mb-3">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addProductModal">
                <i class="fas fa-plus-circle"></i> Add Product
            </button>
        </div>

        <!-- Product List Table -->
        <div class="table-responsive">
            <table class="table table-striped table-bordered">
                <thead class="table-primary">
                    <tr>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Image</th>
                        <th>Discount</th>
                        <th>Discount Price</th>
                        <th>Is Active</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Example row: Loop through products (Thymeleaf syntax example) -->
                    <tr th:each="product : ${products}">
                        <td th:text="${product.title}"></td>
                        <td th:text="${product.description}"></td>
                        <td th:text="${product.category}"></td>
                        <td th:text="${product.price}"></td>
                        <td th:text="${product.stock}"></td>
                        <td>
                            <img th:src="@{${product.image}}" alt="Product Image" width="50" style="cursor: pointer;"
                                 data-bs-toggle="modal" data-bs-target="#imageModal"
                                 th:attr="data-src=@{${product.image}}"/>
                        </td>
                        <td th:text="${product.discount}"></td>
                        <td th:text="${product.discountPrice}"></td>
                        <td th:text="${product.isActive ? 'Yes' : 'No'}"></td>
                        <td>
                            <!-- Edit Product Button -->
                            <button class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#editProductModal"
                                    th:attr="data-id=${product.id}" th:data-title="${product.title}" th:data-description="${product.description}" 
                                    th:data-category="${product.category}" th:data-price="${product.price}" th:data-stock="${product.stock}"
                                    th:data-discount="${product.discount}" th:data-discountprice="${product.discountPrice}"
                                    th:data-isactive="${product.isActive}" th:data-image="${product.image}">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            
                            <!-- Delete Product Button -->
                            <button class="btn btn-danger btn-sm" th:data-id="${product.id}" onclick="deleteProduct(this)">
                                <i class="fas fa-trash-alt"></i> Delete
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="imageModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="imageModalLabel">Product Image</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="modalImage" src="" alt="Product Image" class="img-fluid">
                </div>
            </div>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div class="modal fade" id="addProductModal" tabindex="-1" aria-labelledby="addProductModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/products/add}" method="post"  enctype="multipart/form-data">
                    <div class="modal-header">
                        <h5 class="modal-title" id="addProductModalLabel">Add Product</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <!-- Product Form Fields -->
                        <div class="mb-3">
                            <label for="title" class="form-label">Title</label>
                            <input type="text" class="form-control" id="title" name="title" required>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="category" class="form-label">Category</label>
                            <input type="text" class="form-control" id="category" name="category" required>
                        </div>
                        <div class="mb-3">
                            <label for="stock" class="form-label">Stock</label>
                            <input type="number" class="form-control" id="stock" name="stock" required>
                        </div>
                        <div class="mb-3">
                            <label for="imageFile" class="form-label">Image</label>
                            <input type="file" class="form-control" id="imageFile" name="imageFile" accept="image/*">
                        </div>
                        <div class="mb-3">
                            <label for="price" class="form-label">Price</label>
                            <input type="number" step="0.01" class="form-control price-input" id="price" name="price" required>
                        </div>
                        <div class="mb-3">
                            <label for="discountPrice" class="form-label">Discount Price</label>
                            <input type="number" step="0.01" class="form-control discount-price-input" id="discountPrice" name="discountPrice" required>
                        </div>
                        <div class="mb-3">
                            <label for="discount" class="form-label">Discount (%)</label>
                            <input type="number" step="0.01" class="form-control discount-input" id="discount" name="discount" required readonly>
                        </div>
                        <div class="mb-3">
                            <label for="isActive" class="form-label">Is Active</label>
                            <select class="form-select" id="isActive" name="isActive" required>
                                <option value="true">Yes</option>
                                <option value="false">No</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-primary">Save Product</button>
                    </div>
                </form>
                
            </div>
        </div>
    </div>

    <!-- Edit Product Modal (Fields are populated dynamically using JavaScript) -->
    <div class="modal fade" id="editProductModal" tabindex="-1" aria-labelledby="editProductModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/products/edit/{id}(id=${editId})}" method="post" enctype="multipart/form-data">
                    <!-- This hidden input ensures that the form submission is treated as a PUT request -->
                    <input type="hidden" name="_method" value="PUT">
                    <div class="modal-header">
                        <h5 class="modal-title" id="editProductModalLabel">Edit Product</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="text" id="editId"  name="id">
                        
                        <!-- Similar fields as in Add Product Modal -->
                        <div class="mb-3">
                            <label for="editTitle" class="form-label">Title</label>
                            <input type="text" class="form-control" id="editTitle" name="title" required>
                        </div>
                        <div class="mb-3">
                            <label for="editDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="editDescription" name="description" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="editCategory" class="form-label">Category</label>
                            <input type="text" class="form-control" id="editCategory" name="category" required>
                        </div>
                        <div class="mb-3">
                            <label for="editStock" class="form-label">Stock</label>
                            <input type="number" class="form-control" id="editStock" name="stock" required>
                        </div>
                        <div class="mb-3">
                            <label for="editImage" class="form-label">Image</label>
                            <input type="file" class="form-control" id="editImage" name="imageFile" accept="image/*">
                        </div>
                        <div class="mb-3">
                            <label for="editPrice" class="form-label">Price</label>
                            <input type="number" step="0.01" class="form-control price-input" id="editPrice" name="price" required>
                        </div>
                        <div class="mb-3">
                            <label for="editDiscountPrice" class="form-label">Discount Price</label>
                            <input type="number" step="0.01" class="form-control discount-price-input" id="editDiscountPrice" name="discountPrice" required>
                        </div>
                        <div class="mb-3">
                            <label for="editDiscount" class="form-label">Discount (%)</label>
                            <input type="number" step="0.01" class="form-control discount-input" id="editDiscount" name="discount" required readonly>
                        </div>
                        <div class="mb-3">
                            <label for="editIsActive" class="form-label">Is Active</label>
                            <select class="form-select" id="editIsActive" name="isActive" required>
                                <option value="true">Yes</option>
                                <option value="false">No</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-primary">Update Product</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and necessary scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        function calculateDiscount(modal) {
            const priceInput = modal.querySelector('.price-input');
            const discountPriceInput = modal.querySelector('.discount-price-input');
            const discountInput = modal.querySelector('.discount-input');
    
            priceInput.addEventListener('input', updateDiscount);
            discountPriceInput.addEventListener('input', updateDiscount);
    
            function updateDiscount() {
                const price = parseFloat(priceInput.value);
                const discountPrice = parseFloat(discountPriceInput.value);
    
                if (!isNaN(price) && !isNaN(discountPrice) && price > 0) {
                    const discount = ((price - discountPrice) / price) * 100;
                    discountInput.value = discount.toFixed(2);  // Limit to two decimal places
                } else {
                    discountInput.value = '';
                }
            }
        }

        var addProductModal = document.getElementById('addProductModal');
    addProductModal.addEventListener('show.bs.modal', function (event) {
        calculateDiscount(addProductModal);
    });

        // Script to populate the Edit Product modal with product data
        var editProductModal = document.getElementById('editProductModal');
        editProductModal.addEventListener('show.bs.modal', function (event) {
            var button = event.relatedTarget;
            var productId = button.getAttribute('data-id');
            
            // Set form action dynamically with the correct product ID
            var form = editProductModal.querySelector('form');
            form.action = '/admin/products/edit/' + productId;
            document.getElementById('editId').value = button.getAttribute('data-id');
            document.getElementById('editTitle').value = button.getAttribute('data-title');
            document.getElementById('editDescription').value = button.getAttribute('data-description');
            document.getElementById('editCategory').value = button.getAttribute('data-category');
           
            document.getElementById('editPrice').value = button.getAttribute('data-price');
            document.getElementById('editStock').value = button.getAttribute('data-stock');
            document.getElementById('editDiscount').value = button.getAttribute('data-discount');
            document.getElementById('editDiscountPrice').value = button.getAttribute('data-discountprice');
            document.getElementById('editIsActive').value = button.getAttribute('data-isactive');
             document.getElementById('editImage').value = button.getAttribute('data-image');
            calculateDiscount(editProductModal);
            // Set form action URL dynamically
           
        });
        
        function deleteProduct(button) {
            var productId = button.getAttribute('data-id');
            // Now you can use productId in your delete logic
            if (confirm("Are you sure you want to delete product " + productId + "?")) {
                // Example: Make a request to delete the product
                window.location.href = '/admin/products/delete/' + productId;
            }
        }
        var imageModal = document.getElementById('imageModal');
    imageModal.addEventListener('show.bs.modal', function (event) {
        var image = event.relatedTarget;
        var imageSrc = image.getAttribute('data-src');
        var modalImage = document.getElementById('modalImage');
        modalImage.src = imageSrc;
    });
    </script>
</body>
</html>
